# إعدادات Log Rotation لنظام الخواجة
# يتم تدوير السجلات تلقائياً لتوفير المساحة

/home/zakee/homeupdate/logs/*.log {
    # تدوير السجلات يومياً
    daily
    
    # الاحتفاظ بـ 30 نسخة (شهر كامل)
    rotate 30
    
    # ضغط الملفات القديمة لتوفير المساحة
    compress
    delaycompress
    
    # عدم إظهار خطأ إذا كان الملف غير موجود
    missingok
    
    # عدم تدوير الملفات الفارغة
    notifempty
    
    # إنشاء ملف جديد بنفس الصلاحيات
    create 0644 zakee zakee
    
    # تنفيذ بعد التدوير
    postrotate
        # إعادة تحميل الخدمة لفتح ملفات السجلات الجديدة
        if [ -f /home/zakee/homeupdate/pids/gunicorn.pid ]; then
            kill -USR1 $(cat /home/zakee/homeupdate/pids/gunicorn.pid) 2>/dev/null || true
        fi
    endscript
    
    # حجم أقصى للملف قبل التدوير (100 ميجا)
    maxsize 100M
    
    # حد أدنى لحجم الملف للتدوير (10 ميجا)
    minsize 10M
}

# تدوير سجلات Systemd بشكل أسبوعي
/home/zakee/homeupdate/logs/systemd-*.log {
    weekly
    rotate 8
    compress
    delaycompress
    missingok
    notifempty
    create 0644 zakee zakee
    maxsize 50M
}
